<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Quaresima">
<title>Salvadanaio della Quaresima</title>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --viola: #4a1a6e;
    --viola-light: #7b3fa0;
    --oro: #c9a227;
    --oro-light: #e8c45a;
    --panna: #f5efe0;
    --panna-dark: #e8dcc8;
    --rosso: #8b1a1a;
    --verde-palma: #2d5a27;
    --bg: #1a0d2e;
    --card: #2a1a42;
    --card-light: #3a2455;
    --testo: #f0e6d0;
    --testo-soft: #c4b49a;
    --bordo: #5c3d7a;
    --shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Crimson Text', serif;
    background: var(--bg);
    color: var(--testo);
    min-height: 100vh;
    min-height: -webkit-fill-available;
    max-width: 430px;
    margin: 0 auto;
    position: relative;
    overflow-x: hidden;
  }

  /* Background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse at 20% 0%, rgba(74,26,110,0.5) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 100%, rgba(139,26,26,0.3) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(26,13,46,0.9) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  /* Croce decorativa sfondo */
  body::after {
    content: '✟';
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 60vh;
    color: rgba(74,26,110,0.06);
    pointer-events: none;
    z-index: 0;
    font-family: serif;
  }

  .app { position: relative; z-index: 1; }

  /* HEADER */
  .header {
    background: linear-gradient(180deg, rgba(42,26,66,0.98) 0%, rgba(26,13,46,0.95) 100%);
    border-bottom: 1px solid var(--bordo);
    padding: 16px 20px 14px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(10px);
  }

  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }

  .header h1 {
    font-family: 'Cinzel', serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--oro);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  .header-sub {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 11px;
    color: var(--testo-soft);
    letter-spacing: 0.5px;
  }

  .settings-btn {
    background: none;
    border: 1px solid var(--bordo);
    color: var(--testo-soft);
    width: 36px;
    height: 36px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .settings-btn:active { background: var(--card-light); transform: scale(0.95); }

  /* GIORNI QUARESIMA */
  .lent-progress {
    padding: 16px 20px 12px;
  }

  .lent-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }

  .lent-label {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    color: var(--testo-soft);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .lent-days {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    color: var(--oro);
    letter-spacing: 0.5px;
  }

  .progress-bar {
    height: 4px;
    background: rgba(92,61,122,0.4);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--viola-light), var(--oro));
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  /* TOTALE QUARESIMA */
  .total-card {
    margin: 0 16px 16px;
    background: linear-gradient(135deg, var(--viola) 0%, #2d0d4e 100%);
    border: 1px solid var(--bordo);
    border-radius: 16px;
    padding: 20px;
    position: relative;
    overflow: hidden;
    box-shadow: var(--shadow);
  }

  .total-card::before {
    content: '✟';
    position: absolute;
    right: -10px;
    top: -10px;
    font-size: 80px;
    color: rgba(201,162,39,0.08);
    font-family: serif;
  }

  .total-label {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--oro-light);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .total-amount {
    font-family: 'Cinzel', serif;
    font-size: 42px;
    font-weight: 700;
    color: var(--oro);
    line-height: 1;
    text-shadow: 0 0 30px rgba(201,162,39,0.4);
  }

  .total-amount span { font-size: 22px; margin-right: 2px; }

  .total-sub {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 13px;
    color: var(--testo-soft);
    margin-top: 6px;
  }

  .total-stats {
    display: flex;
    gap: 16px;
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid rgba(92,61,122,0.5);
  }

  .stat-item { flex: 1; text-align: center; }
  .stat-val {
    font-family: 'Cinzel', serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--oro-light);
    display: block;
  }
  .stat-lbl {
    font-size: 11px;
    color: var(--testo-soft);
    font-style: italic;
  }

  /* BOTTONI IMPORTO */
  .section-title {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--testo-soft);
    text-transform: uppercase;
    padding: 0 20px;
    margin-bottom: 10px;
  }

  .amounts-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    padding: 0 16px;
    margin-bottom: 16px;
  }

  .amount-btn {
    background: var(--card);
    border: 1.5px solid var(--bordo);
    border-radius: 14px;
    padding: 16px 12px;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }

  .amount-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--viola-light), var(--oro));
    opacity: 0;
    transition: opacity 0.15s;
  }

  .amount-btn:active::before { opacity: 0.15; }
  .amount-btn:active { transform: scale(0.96); border-color: var(--oro); }

  .amount-btn.featured {
    grid-column: 1 / -1;
    background: linear-gradient(135deg, rgba(74,26,110,0.6), rgba(42,26,66,0.8));
    border-color: var(--oro);
  }

  .amount-emoji { font-size: 22px; display: block; margin-bottom: 4px; position: relative; }
  .amount-val {
    font-family: 'Cinzel', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--oro);
    position: relative;
  }
  .amount-label {
    font-size: 11px;
    color: var(--testo-soft);
    font-style: italic;
    position: relative;
    margin-top: 2px;
    display: block;
  }

  /* DONAZIONE OGGI */
  .today-section {
    padding: 0 16px;
    margin-bottom: 20px;
  }

  .today-card {
    background: var(--card);
    border: 1px solid var(--bordo);
    border-radius: 16px;
    overflow: hidden;
  }

  .today-header {
    background: linear-gradient(90deg, rgba(42,26,66,0.8), rgba(26,13,46,0.8));
    padding: 14px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--bordo);
  }

  .today-title {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    letter-spacing: 1px;
    color: var(--oro-light);
  }

  .today-total {
    font-family: 'Cinzel', serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--oro);
  }

  .donations-list { max-height: 280px; overflow-y: auto; }

  .donation-item {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    border-bottom: 1px solid rgba(92,61,122,0.25);
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-10px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .donation-item:last-child { border-bottom: none; }

  .donation-icon {
    width: 36px;
    height: 36px;
    background: rgba(74,26,110,0.4);
    border: 1px solid var(--bordo);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    margin-right: 12px;
    flex-shrink: 0;
  }

  .donation-info { flex: 1; }
  .donation-time { font-size: 12px; color: var(--testo-soft); font-style: italic; }
  .donation-note { font-size: 12px; color: var(--testo-soft); }

  .donation-amount {
    font-family: 'Cinzel', serif;
    font-size: 17px;
    font-weight: 600;
    color: var(--oro);
  }

  .delete-btn {
    background: none;
    border: none;
    color: rgba(139,26,26,0.5);
    font-size: 18px;
    cursor: pointer;
    padding: 4px 8px;
    margin-left: 8px;
    border-radius: 6px;
    transition: all 0.2s;
  }
  .delete-btn:active { color: var(--rosso); background: rgba(139,26,26,0.1); }

  .empty-state {
    text-align: center;
    padding: 30px 20px;
    color: var(--testo-soft);
    font-style: italic;
    font-size: 14px;
  }

  .empty-state .empty-icon { font-size: 36px; margin-bottom: 8px; display: block; opacity: 0.5; }

  /* STORICO */
  .history-section { padding: 0 16px; margin-bottom: 80px; }

  .history-day {
    background: var(--card);
    border: 1px solid var(--bordo);
    border-radius: 12px;
    margin-bottom: 10px;
    overflow: hidden;
  }

  .history-day-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 14px;
    cursor: pointer;
    background: rgba(42,26,66,0.5);
  }

  .history-date {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    color: var(--testo-soft);
  }

  .history-day-total {
    font-family: 'Cinzel', serif;
    font-size: 14px;
    color: var(--oro);
  }

  .history-day-donations {
    padding: 0 14px 8px;
    display: none;
  }

  .history-day-donations.open { display: block; }

  .history-don-item {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    border-bottom: 1px solid rgba(92,61,122,0.2);
    font-size: 13px;
    color: var(--testo-soft);
  }
  .history-don-item:last-child { border-bottom: none; }
  .history-don-amount { color: var(--oro-light); font-family: 'Cinzel', serif; font-size: 13px; }

  /* REPORT PASQUALE */
  .report-section { padding: 0 16px; margin-bottom: 80px; }

  .report-card {
    background: linear-gradient(135deg, rgba(42,26,66,0.95), rgba(26,13,46,0.95));
    border: 1px solid var(--oro);
    border-radius: 16px;
    padding: 24px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .report-card::before {
    content: '✟';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 120px;
    color: rgba(201,162,39,0.04);
    font-family: serif;
  }

  .report-title {
    font-family: 'Cinzel', serif;
    font-size: 18px;
    color: var(--oro);
    margin-bottom: 6px;
    letter-spacing: 1px;
  }

  .report-subtitle {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 14px;
    color: var(--testo-soft);
    margin-bottom: 24px;
  }

  .report-amount {
    font-family: 'Cinzel', serif;
    font-size: 52px;
    font-weight: 700;
    color: var(--oro);
    text-shadow: 0 0 40px rgba(201,162,39,0.5);
    margin-bottom: 8px;
  }

  .report-desc {
    font-size: 14px;
    color: var(--testo-soft);
    font-style: italic;
    margin-bottom: 20px;
    line-height: 1.6;
  }

  .report-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 20px;
    padding: 16px;
    background: rgba(74,26,110,0.2);
    border-radius: 12px;
    border: 1px solid rgba(92,61,122,0.4);
  }

  .report-stat { text-align: center; }
  .report-stat-val { font-family: 'Cinzel', serif; font-size: 20px; color: var(--oro-light); display: block; }
  .report-stat-lbl { font-size: 10px; color: var(--testo-soft); font-style: italic; }

  .share-btn {
    background: linear-gradient(135deg, var(--viola-light), var(--viola));
    border: 1px solid var(--oro);
    color: var(--oro);
    font-family: 'Cinzel', serif;
    font-size: 13px;
    letter-spacing: 1px;
    padding: 14px 24px;
    border-radius: 12px;
    cursor: pointer;
    width: 100%;
    transition: all 0.2s;
    margin-top: 8px;
  }
  .share-btn:active { transform: scale(0.97); }

  /* NAV */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 430px;
    background: rgba(26,13,46,0.97);
    border-top: 1px solid var(--bordo);
    display: flex;
    backdrop-filter: blur(10px);
    z-index: 100;
  }

  .nav-btn {
    flex: 1;
    padding: 10px 4px 8px;
    background: none;
    border: none;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    transition: all 0.2s;
    color: var(--testo-soft);
  }

  .nav-btn.active { color: var(--oro); }
  .nav-btn .nav-icon { font-size: 22px; }
  .nav-btn .nav-label { font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 0.5px; }

  /* VIEWS */
  .view { display: none; padding-top: 8px; }
  .view.active { display: block; }

  /* MODALE IMPOSTAZIONI */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 200;
    display: flex;
    align-items: flex-end;
    backdrop-filter: blur(4px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: linear-gradient(180deg, #2a1a42 0%, #1a0d2e 100%);
    border: 1px solid var(--bordo);
    border-bottom: none;
    border-radius: 20px 20px 0 0;
    width: 100%;
    max-width: 430px;
    margin: 0 auto;
    padding: 20px;
    transform: translateY(100%);
    transition: transform 0.3s ease;
    max-height: 85vh;
    overflow-y: auto;
  }

  .modal-overlay.open .modal { transform: translateY(0); }

  .modal-handle {
    width: 36px;
    height: 4px;
    background: var(--bordo);
    border-radius: 2px;
    margin: 0 auto 20px;
  }

  .modal-title {
    font-family: 'Cinzel', serif;
    font-size: 16px;
    color: var(--oro);
    margin-bottom: 20px;
    text-align: center;
    letter-spacing: 1px;
  }

  .setting-group { margin-bottom: 20px; }

  .setting-label {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 1.5px;
    color: var(--testo-soft);
    text-transform: uppercase;
    margin-bottom: 10px;
    display: block;
  }

  .amount-inputs {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
  }

  .amount-input-wrap { position: relative; }
  .amount-input-wrap label {
    font-size: 11px;
    color: var(--testo-soft);
    display: block;
    margin-bottom: 4px;
  }

  .amount-input {
    width: 100%;
    background: var(--card-light);
    border: 1px solid var(--bordo);
    border-radius: 10px;
    color: var(--testo);
    font-family: 'Cinzel', serif;
    font-size: 16px;
    padding: 10px 12px 10px 30px;
    outline: none;
    transition: border-color 0.2s;
  }
  .amount-input:focus { border-color: var(--oro); }

  .euro-prefix {
    position: absolute;
    left: 10px;
    bottom: 10px;
    color: var(--oro);
    font-family: 'Cinzel', serif;
    font-size: 14px;
  }

  .lent-year-wrap {
    position: relative;
  }

  .lent-year-input {
    width: 100%;
    background: var(--card-light);
    border: 1px solid var(--bordo);
    border-radius: 10px;
    color: var(--testo);
    font-family: 'Cinzel', serif;
    font-size: 15px;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.2s;
  }
  .lent-year-input:focus { border-color: var(--oro); }

  .save-btn {
    background: linear-gradient(135deg, var(--oro), #a07a10);
    border: none;
    color: #1a0d2e;
    font-family: 'Cinzel', serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 16px 24px;
    border-radius: 12px;
    cursor: pointer;
    width: 100%;
    margin-top: 12px;
    transition: all 0.2s;
  }
  .save-btn:active { transform: scale(0.97); }

  .danger-btn {
    background: none;
    border: 1px solid var(--rosso);
    color: var(--rosso);
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 1px;
    padding: 12px 24px;
    border-radius: 12px;
    cursor: pointer;
    width: 100%;
    margin-top: 8px;
    transition: all 0.2s;
  }
  .danger-btn:active { background: rgba(139,26,26,0.1); }

  /* TOAST */
  .toast {
    position: fixed;
    top: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: linear-gradient(135deg, var(--viola-light), var(--viola));
    border: 1px solid var(--oro);
    color: var(--oro);
    font-family: 'Cinzel', serif;
    font-size: 13px;
    padding: 12px 24px;
    border-radius: 30px;
    z-index: 300;
    opacity: 0;
    transition: all 0.3s;
    white-space: nowrap;
    letter-spacing: 0.5px;
    pointer-events: none;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--bordo); border-radius: 2px; }

  /* QUOTE quaresimale */
  .quote-bar {
    margin: 0 16px 16px;
    padding: 10px 14px;
    background: rgba(42,26,66,0.4);
    border-left: 3px solid var(--oro);
    border-radius: 0 8px 8px 0;
  }

  .quote-text {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 13px;
    color: var(--testo-soft);
    line-height: 1.5;
  }

  .quote-source { font-size: 11px; color: rgba(201,162,39,0.6); margin-top: 4px; }

  /* Pulsante stampa */
  @media print {
    .bottom-nav, .settings-btn, .header { display: none; }
    body { background: white; color: black; }
    .report-card { border: 2px solid #4a1a6e; background: white; color: black; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="header-top">
      <div>
        <h1>✟ Salvadanaio della Quaresima</h1>
        <div class="header-sub" id="headerDate">Caricamento...</div>
      </div>
      <button class="settings-btn" onclick="openSettings()" title="Impostazioni">⚙️</button>
    </div>
  </div>

  <!-- VIEWS -->

  <!-- HOME -->
  <div class="view active" id="view-home">
    <!-- Progress Quaresima -->
    <div class="lent-progress">
      <div class="lent-info">
        <span class="lent-label">Cammino Quaresimale</span>
        <span class="lent-days" id="lentDaysLeft"></span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="lentProgress"></div>
      </div>
    </div>

    <!-- Totale Quaresima -->
    <div class="total-card">
      <div class="total-label">Totale Offerte Quaresima</div>
      <div class="total-amount"><span>€</span><span id="grandTotal">0,00</span></div>
      <div class="total-sub" id="totalSub">Inizia la tua quaresima di carità</div>
      <div class="total-stats">
        <div class="stat-item">
          <span class="stat-val" id="statGiorni">0</span>
          <span class="stat-lbl">Giorni</span>
        </div>
        <div class="stat-item">
          <span class="stat-val" id="statDonazioni">0</span>
          <span class="stat-lbl">Offerte</span>
        </div>
        <div class="stat-item">
          <span class="stat-val" id="statMedia">€0</span>
          <span class="stat-lbl">Media/giorno</span>
        </div>
      </div>
    </div>

    <!-- Citazione -->
    <div class="quote-bar" id="quoteBar"></div>

    <!-- Bottoni importo -->
    <div class="section-title">Aggiungi un'offerta</div>
    <div class="amounts-grid" id="amountsGrid"></div>

    <!-- Donazioni di oggi -->
    <div class="today-section">
      <div class="today-card">
        <div class="today-header">
          <span class="today-title">✟ Offerte di oggi</span>
          <span class="today-total" id="todayTotal">€ 0,00</span>
        </div>
        <div class="donations-list" id="todayList"></div>
      </div>
    </div>
  </div>

  <!-- STORICO -->
  <div class="view" id="view-history">
    <div style="padding: 16px 0 8px;">
      <div class="section-title">Storico per Giorno</div>
    </div>
    <div class="history-section" id="historyList"></div>
  </div>

  <!-- REPORT -->
  <div class="view" id="view-report">
    <div style="padding: 16px 0 8px;">
      <div class="section-title">Tallone di Pasqua</div>
    </div>
    <div class="report-section" id="reportSection"></div>
  </div>

</div><!-- .app -->

<!-- NAV -->
<div class="bottom-nav">
  <button class="nav-btn active" onclick="showView('home', this)">
    <span class="nav-icon">🕊️</span>
    <span class="nav-label">Offerte</span>
  </button>
  <button class="nav-btn" onclick="showView('history', this)">
    <span class="nav-icon">📜</span>
    <span class="nav-label">Storico</span>
  </button>
  <button class="nav-btn" onclick="showView('report', this)">
    <span class="nav-icon">🌷</span>
    <span class="nav-label">Pasqua</span>
  </button>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- MODALE IMPOSTAZIONI -->
<div class="modal-overlay" id="settingsOverlay" onclick="closeSettingsOutside(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">⚙️ Impostazioni</div>

    <div class="setting-group">
      <span class="setting-label">Importi rapidi (€)</span>
      <div class="amount-inputs" id="amountInputs"></div>
    </div>

    <div class="setting-group">
      <span class="setting-label">Anno Quaresima</span>
      <div class="lent-year-wrap">
        <input type="number" class="lent-year-input" id="settingYear" value="2025">
      </div>
    </div>

    <button class="save-btn" onclick="saveSettings()">✓ Salva Impostazioni</button>
    <button class="danger-btn" onclick="confirmReset()">🗑 Cancella tutti i dati</button>
  </div>
</div>

<script>
// =====================
// DATI & STATO
// =====================

const QUOTES = [
  { text: "Quando fai l'elemosina, non sappia la tua sinistra ciò che fa la tua destra.", source: "Mt 6,3" },
  { text: "Date e vi sarà dato; una misura buona, pigiata, colma e traboccante vi sarà versata nel grembo.", source: "Lc 6,38" },
  { text: "Chi semina scarsamente, scarsamente raccoglierà; chi semina con larghezza, con larghezza raccoglierà.", source: "2Cor 9,6" },
  { text: "Beati i misericordiosi, perché troveranno misericordia.", source: "Mt 5,7" },
  { text: "La carità copre una moltitudine di peccati.", source: "1Pt 4,8" },
  { text: "Ciò che avete fatto al più piccolo dei miei fratelli, l'avete fatto a me.", source: "Mt 25,40" },
  { text: "Non stanco il tuo occhio dal guardare i poveri.", source: "Sir 4,1" },
  { text: "Convertitevi a me con tutto il cuore, con digiuni, con pianti e lamenti.", source: "Gl 2,12" },
];

const AMOUNT_LABELS = {
  1: "Piccolo dono",
  2: "Doppio dono",
  5: "Gesto di cuore",
  10: "Offerta generosa",
  20: "Dono abbondante",
  50: "Grande carità",
};

function getSettings() {
  const def = { amounts: [1, 2, 5, 10], year: 2025 };
  try {
    const s = JSON.parse(localStorage.getItem('quaresima_settings') || '{}');
    return { ...def, ...s };
  } catch { return def; }
}

function saveSettingsData(s) {
  localStorage.setItem('quaresima_settings', JSON.stringify(s));
}

function getDonations() {
  try {
    return JSON.parse(localStorage.getItem('quaresima_donations') || '[]');
  } catch { return []; }
}

function saveDonations(d) {
  localStorage.setItem('quaresima_donations', JSON.stringify(d));
}

// =====================
// CALCOLI QUARESIMA
// =====================

// Calcola Pasqua (algoritmo Anonymous Gregorian)
function calcEaster(year) {
  const a = year % 19;
  const b = Math.floor(year / 100);
  const c = year % 100;
  const d = Math.floor(b / 4);
  const e = b % 4;
  const f = Math.floor((b + 8) / 25);
  const g = Math.floor((b - f + 1) / 3);
  const h = (19 * a + b - d - g + 15) % 30;
  const i = Math.floor(c / 4);
  const k = c % 4;
  const l = (32 + 2 * e + 2 * i - h - k) % 7;
  const m = Math.floor((a + 11 * h + 22 * l) / 451);
  const month = Math.floor((h + l - 7 * m + 114) / 31);
  const day = ((h + l - 7 * m + 114) % 31) + 1;
  return new Date(year, month - 1, day);
}

// Mercoledì delle Ceneri = 46 giorni prima di Pasqua
function calcAshWednesday(year) {
  const easter = calcEaster(year);
  const ash = new Date(easter);
  ash.setDate(ash.getDate() - 46);
  return ash;
}

function dateStr(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function formatDate(dateString) {
  const [y,m,d] = dateString.split('-').map(Number);
  const dt = new Date(y, m-1, d);
  const days = ['Domenica','Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato'];
  const months = ['gennaio','febbraio','marzo','aprile','maggio','giugno','luglio','agosto','settembre','ottobre','novembre','dicembre'];
  return `${days[dt.getDay()]} ${d} ${months[m-1]}`;
}

function formatTime(isoString) {
  const d = new Date(isoString);
  return d.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
}

function formatEuro(n) {
  return n.toFixed(2).replace('.', ',');
}

function todayStr() {
  return dateStr(new Date());
}

// =====================
// RENDER
// =====================

function renderAll() {
  renderHeader();
  renderProgress();
  renderTotals();
  renderQuote();
  renderAmounts();
  renderTodayList();
  if (document.getElementById('view-history').classList.contains('active')) renderHistory();
  if (document.getElementById('view-report').classList.contains('active')) renderReport();
}

function renderHeader() {
  const now = new Date();
  const days = ['Domenica','Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato'];
  const months = ['gennaio','febbraio','marzo','aprile','maggio','giugno','luglio','agosto','settembre','ottobre','novembre','dicembre'];
  document.getElementById('headerDate').textContent = 
    `${days[now.getDay()]} ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
}

function renderProgress() {
  const s = getSettings();
  const year = s.year;
  const ash = calcAshWednesday(year);
  const easter = calcEaster(year);
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());

  const totalDays = 46;
  const elapsed = Math.max(0, Math.min(totalDays, Math.floor((today - ash) / 86400000)));
  const remaining = Math.max(0, totalDays - elapsed);
  const pct = Math.min(100, (elapsed / totalDays) * 100);

  document.getElementById('lentProgress').style.width = pct + '%';

  if (today < ash) {
    const daysToAsh = Math.ceil((ash - today) / 86400000);
    document.getElementById('lentDaysLeft').textContent = `Ceneri tra ${daysToAsh} giorni`;
  } else if (today >= ash && today <= easter) {
    if (remaining === 0) {
      document.getElementById('lentDaysLeft').textContent = '🌷 Buona Pasqua!';
    } else {
      document.getElementById('lentDaysLeft').textContent = `${remaining} giorni a Pasqua`;
    }
  } else {
    document.getElementById('lentDaysLeft').textContent = 'Quaresima completata ✓';
  }
}

function renderTotals() {
  const donations = getDonations();
  const grandTotal = donations.reduce((sum, d) => sum + d.amount, 0);
  const today = todayStr();
  const todayTotal = donations.filter(d => d.date === today).reduce((sum, d) => sum + d.amount, 0);

  // Giorni con almeno una donazione
  const daysSet = new Set(donations.map(d => d.date));
  const giorni = daysSet.size;

  document.getElementById('grandTotal').textContent = formatEuro(grandTotal);
  document.getElementById('statGiorni').textContent = giorni;
  document.getElementById('statDonazioni').textContent = donations.length;
  document.getElementById('statMedia').textContent = '€' + (giorni > 0 ? Math.round(grandTotal/giorni) : 0);

  if (grandTotal === 0) {
    document.getElementById('totalSub').textContent = 'Inizia la tua quaresima di carità';
  } else {
    document.getElementById('totalSub').textContent = `${donations.length} offert${donations.length===1?'a':'e'} in ${giorni} giorn${giorni===1?'o':'i'}`;
  }
}

function renderQuote() {
  const q = QUOTES[Math.floor(Date.now() / 86400000) % QUOTES.length];
  document.getElementById('quoteBar').innerHTML = 
    `<div class="quote-text">"${q.text}"</div><div class="quote-source">— ${q.source}</div>`;
}

function renderAmounts() {
  const s = getSettings();
  const grid = document.getElementById('amountsGrid');
  grid.innerHTML = '';

  s.amounts.forEach((amt, i) => {
    const label = AMOUNT_LABELS[amt] || 'Offerta';
    const emojis = ['🕊️','✝️','🙏','💛','🌿','⛪'];
    const featured = i === 2; // il terzo bottone
    const btn = document.createElement('div');
    btn.className = 'amount-btn' + (featured ? ' featured' : '');
    btn.innerHTML = `
      <span class="amount-emoji">${emojis[i % emojis.length]}</span>
      <div class="amount-val">€ ${amt % 1 === 0 ? amt : amt.toFixed(2)}</div>
      <span class="amount-label">${label}</span>
    `;
    btn.onclick = () => addDonation(amt);
    grid.appendChild(btn);
  });
}

function renderTodayList() {
  const donations = getDonations();
  const today = todayStr();
  const todayDons = donations.filter(d => d.date === today).sort((a,b) => new Date(b.ts) - new Date(a.ts));
  const todayTotal = todayDons.reduce((s,d) => s + d.amount, 0);

  document.getElementById('todayTotal').textContent = '€ ' + formatEuro(todayTotal);

  const list = document.getElementById('todayList');
  if (todayDons.length === 0) {
    list.innerHTML = `<div class="empty-state"><span class="empty-icon">🕊️</span>Nessuna offerta oggi<br>Scegli un importo qui sopra</div>`;
    return;
  }

  list.innerHTML = todayDons.map(d => `
    <div class="donation-item" id="don-${d.id}">
      <div class="donation-icon">✟</div>
      <div class="donation-info">
        <div class="donation-time">${formatTime(d.ts)}</div>
      </div>
      <div class="donation-amount">€ ${formatEuro(d.amount)}</div>
      <button class="delete-btn" onclick="deleteDonation('${d.id}')">✕</button>
    </div>
  `).join('');
}

function renderHistory() {
  const donations = getDonations();
  if (donations.length === 0) {
    document.getElementById('historyList').innerHTML = 
      `<div class="empty-state"><span class="empty-icon">📜</span>Nessuna offerta registrata</div>`;
    return;
  }

  // Raggruppa per giorno
  const byDay = {};
  donations.forEach(d => {
    if (!byDay[d.date]) byDay[d.date] = [];
    byDay[d.date].push(d);
  });

  const sortedDays = Object.keys(byDay).sort((a,b) => b.localeCompare(a));

  document.getElementById('historyList').innerHTML = sortedDays.map(day => {
    const dons = byDay[day].sort((a,b) => new Date(a.ts) - new Date(b.ts));
    const total = dons.reduce((s,d) => s + d.amount, 0);
    const today = todayStr();
    const isToday = day === today;

    return `
      <div class="history-day">
        <div class="history-day-header" onclick="toggleDay('${day}')">
          <span class="history-date">${isToday ? '✟ Oggi — ' : ''}${formatDate(day)}</span>
          <span class="history-day-total">€ ${formatEuro(total)}</span>
        </div>
        <div class="history-day-donations" id="hist-${day}">
          ${dons.map(d => `
            <div class="history-don-item">
              <span>${formatTime(d.ts)} — ${dons.length} offert${dons.length===1?'a':'e'}</span>
              <span class="history-don-amount">€ ${formatEuro(d.amount)}</span>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }).join('');
}

function toggleDay(day) {
  const el = document.getElementById('hist-' + day);
  el.classList.toggle('open');
}

function renderReport() {
  const donations = getDonations();
  const s = getSettings();
  const year = s.year;
  const easter = calcEaster(year);
  const ash = calcAshWednesday(year);

  const grandTotal = donations.reduce((sum, d) => sum + d.amount, 0);
  const daysSet = new Set(donations.map(d => d.date));
  const giorni = daysSet.size;
  const nDons = donations.length;
  const media = giorni > 0 ? grandTotal / giorni : 0;

  const byDay = {};
  donations.forEach(d => {
    if (!byDay[d.date]) byDay[d.date] = 0;
    byDay[d.date] += d.amount;
  });
  const maxDay = Object.entries(byDay).sort((a,b) => b[1]-a[1])[0];

  const easterStr = easter.toLocaleDateString('it-IT', { day: 'numeric', month: 'long', year: 'numeric' });
  const ashStr = ash.toLocaleDateString('it-IT', { day: 'numeric', month: 'long', year: 'numeric' });

  const now = new Date();
  const printDate = now.toLocaleDateString('it-IT', { day: 'numeric', month: 'long', year: 'numeric' });

  document.getElementById('reportSection').innerHTML = `
    <div class="report-card">
      <div class="report-title">✟ Tallone di Pasqua ${year} ✟</div>
      <div class="report-subtitle">Quaresima ${ashStr} — ${easterStr}</div>

      <div class="report-amount">€ ${formatEuro(grandTotal)}</div>
      <div class="report-desc">
        Con ${nDons} offert${nDons===1?'a':'e'} in ${giorni} giorn${giorni===1?'o':'i'} di cammino quaresimale,<br>
        hai testimoniato la carità cristiana.
      </div>

      <div class="report-stats">
        <div class="report-stat">
          <span class="report-stat-val">${nDons}</span>
          <span class="report-stat-lbl">Offerte totali</span>
        </div>
        <div class="report-stat">
          <span class="report-stat-val">${giorni}</span>
          <span class="report-stat-lbl">Giorni</span>
        </div>
        <div class="report-stat">
          <span class="report-stat-val">€${formatEuro(media)}</span>
          <span class="report-stat-lbl">Media/giorno</span>
        </div>
      </div>

      ${maxDay ? `<div style="font-family:'IM Fell English',serif;font-style:italic;font-size:13px;color:var(--testo-soft);margin-bottom:16px;">
        Giorno più generoso: ${formatDate(maxDay[0])} (€ ${formatEuro(maxDay[1])})
      </div>` : ''}

      <div style="font-size:11px;color:rgba(201,162,39,0.5);margin-bottom:16px;">
        Stampato il ${printDate}
      </div>

      <button class="share-btn" onclick="printReport()">🖨 Stampa / Salva il tallone</button>
      <button class="share-btn" style="margin-top:8px;background:linear-gradient(135deg,#2d5a27,#1a3a15);border-color:var(--verde-palma);color:#90c878;" onclick="copyReport()">📋 Copia riepilogo</button>
    </div>
  `;
}

// =====================
// AZIONI
// =====================

function addDonation(amount) {
  const donations = getDonations();
  const now = new Date();
  const donation = {
    id: Date.now().toString(),
    amount: Number(amount),
    date: todayStr(),
    ts: now.toISOString()
  };
  donations.push(donation);
  saveDonations(donations);
  renderAll();
  showToast(`✟ Offerta di € ${formatEuro(amount)} registrata`);
}

function deleteDonation(id) {
  const donations = getDonations().filter(d => d.id !== id);
  saveDonations(donations);
  renderAll();
}

// =====================
// SETTINGS
// =====================

function openSettings() {
  const s = getSettings();
  const inputs = document.getElementById('amountInputs');
  inputs.innerHTML = s.amounts.map((amt, i) => `
    <div class="amount-input-wrap">
      <label>Importo ${i+1}</label>
      <span class="euro-prefix">€</span>
      <input type="number" class="amount-input" id="amt${i}" value="${amt}" min="0.01" step="0.01">
    </div>
  `).join('');
  document.getElementById('settingYear').value = s.year;
  document.getElementById('settingsOverlay').classList.add('open');
}

function closeSettingsOutside(e) {
  if (e.target === document.getElementById('settingsOverlay')) closeSettings();
}

function closeSettings() {
  document.getElementById('settingsOverlay').classList.remove('open');
}

function saveSettings() {
  const s = getSettings();
  const newAmounts = s.amounts.map((_, i) => {
    const v = parseFloat(document.getElementById('amt' + i)?.value || '0');
    return v > 0 ? v : s.amounts[i];
  });
  const year = parseInt(document.getElementById('settingYear').value) || s.year;
  saveSettingsData({ amounts: newAmounts, year });
  closeSettings();
  renderAll();
  showToast('✓ Impostazioni salvate');
}

function confirmReset() {
  if (confirm('Cancellare TUTTI i dati della Quaresima? Questa azione non è reversibile.')) {
    localStorage.removeItem('quaresima_donations');
    closeSettings();
    renderAll();
    showToast('🗑 Dati cancellati');
  }
}

// =====================
// VISTE
// =====================

function showView(name, btn) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  btn.classList.add('active');

  if (name === 'history') renderHistory();
  if (name === 'report') renderReport();
}

// =====================
// REPORT
// =====================

function printReport() {
  window.print();
}

function copyReport() {
  const donations = getDonations();
  const s = getSettings();
  const grandTotal = donations.reduce((sum, d) => sum + d.amount, 0);
  const daysSet = new Set(donations.map(d => d.date));
  const easter = calcEaster(s.year);
  const easterStr = easter.toLocaleDateString('it-IT', { day: 'numeric', month: 'long', year: 'numeric' });

  const text = `✟ TALLONE DI PASQUA ${s.year} ✟\n\nOfferte Quaresimali\nPasqua: ${easterStr}\n\nTotale: € ${formatEuro(grandTotal)}\nNumero offerte: ${donations.length}\nGiorni di carità: ${daysSet.size}\n\nAd maiorem Dei gloriam`;

  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => showToast('📋 Copiato!'));
  } else {
    prompt('Copia questo testo:', text);
  }
}

// =====================
// TOAST
// =====================

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// =====================
// INIT
// =====================

document.addEventListener('DOMContentLoaded', () => {
  // Se non ci sono impostazioni, setta l'anno corrente come default
  const s = getSettings();
  if (!localStorage.getItem('quaresima_settings')) {
    saveSettingsData({ amounts: [1, 2, 5, 10], year: new Date().getFullYear() });
  }
  renderAll();

  // Aggiorna data ogni minuto
  setInterval(renderHeader, 60000);
});
</script>
